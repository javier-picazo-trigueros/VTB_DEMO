version: '3.8'

services:
  backend:
    build: ./backend
    container_name: vtb-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - vtb-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_EXPLORER_URL: ${VITE_EXPLORER_URL:-http://localhost:8545}
        VITE_RPC_URL: ${VITE_RPC_URL:-http://localhost:8545}
        VITE_CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
    container_name: vtb-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Solo para desarrollo local con blockchain
  hardhat:
    image: node:20-alpine
    container_name: vtb-hardhat
    working_dir: /app
    command: sh -c "npm install && npx hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"
    volumes:
      - .:/app
    profiles:
      - dev    # Usar: docker compose --profile dev up

volumes:
  vtb-data:
    driver: local
