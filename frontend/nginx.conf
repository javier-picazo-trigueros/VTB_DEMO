# Reemplaza el nginx.conf del frontend
$content = @'
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
'@
Set-Content -Path "C:\Users\javie\Downloads\VTB_DEMO\frontend\nginx.conf" -Value $content
